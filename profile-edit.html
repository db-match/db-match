<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Complete Profile | Dawoodi Bohra Match
</title>

<link rel="stylesheet"
href="css/variables.css">

<link rel="stylesheet"
href="css/layout.css">

<link rel="stylesheet"
href="css/main.css">

<link rel="stylesheet"
href="css/responsive.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1>
Complete Your Profile
</h1>

<p>
Help the community know you better.
</p>

<form id="profile-form">



<select id="gender" required>

<option value="">
Select Gender
</option>

<option value="Male">
Male
</option>

<option value="Female">
Female
</option>

</select>



<input type="date"
id="dob"
required>



<input type="number"
id="age"
placeholder="Age"
required>



<input type="text"
id="city"
placeholder="City"
required>



<input type="text"
id="state"
placeholder="State">



<input type="text"
id="country"
placeholder="Country"
required>



<input type="text"
id="profession"
placeholder="Profession">



<input type="text"
id="company"
placeholder="Company">



<input type="text"
id="education"
placeholder="Education">



<select id="maritalStatus">

<option value="">
Marital Status
</option>

<option value="Never Married">
Never Married
</option>

<option value="Divorced">
Divorced
</option>

<option value="Widowed">
Widowed
</option>

</select>



<input type="text"
id="sect"
placeholder="Sect">



<input type="text"
id="jamaat"
placeholder="Jamaat">



<input type="text"
id="motherTongue"
placeholder="Mother Tongue">



<input type="text"
id="height"
placeholder="Height">



<input type="text"
id="weight"
placeholder="Weight">



<select id="religiousValues">

<option value="">
Religious Values
</option>

<option value="Very Religious">
Very Religious
</option>

<option value="Moderate">
Moderate
</option>

<option value="Simple">
Simple
</option>

</select>



<select id="prayerFrequency">

<option value="">
Prayer Frequency
</option>

<option value="Regular">
Regular
</option>

<option value="Sometimes">
Sometimes
</option>

<option value="Learning">
Learning
</option>

</select>



<textarea
id="bio"
placeholder="Write something about yourself"
rows="5"></textarea>



<button type="submit"
class="primary-btn">

Save Profile

</button>

</form>

</div>

</div>



<div id="toast" class="toast"></div>

<div id="global-loader" class="global-loader">

<div class="loader-spinner"></div>

</div>



<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase/firebase-config.js"></script>

<script src="js/ui.js"></script>

<script src="js/profile.js"></script>

<script>

lucide.createIcons();

</script>

</body>
</html>
