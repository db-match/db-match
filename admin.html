<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Panel | Dawoodi Bohra Match
</title>

<link rel="stylesheet"
href="css/variables.css">

<link rel="stylesheet"
href="css/layout.css">

<link rel="stylesheet"
href="css/main.css">

<link rel="stylesheet"
href="css/responsive.css">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* =========================================
BODY
========================================= */

body{
margin:0;
background:#f5f7fb;
font-family:inherit;
}

/* =========================================
ADMIN LAYOUT
========================================= */

.admin-layout{
display:flex;
min-height:100vh;
}

/* =========================================
SIDEBAR
========================================= */

.admin-sidebar{
width:270px;
background:#111827;
color:#fff;
padding:24px;
display:flex;
flex-direction:column;
position:fixed;
top:0;
left:0;
bottom:0;
overflow-y:auto;
}

/* =========================================
LOGO
========================================= */

.admin-logo{
font-size:26px;
font-weight:700;
margin-bottom:40px;
line-height:1.4;
}

/* =========================================
MENU
========================================= */

.admin-menu{
display:flex;
flex-direction:column;
gap:10px;
}

/* =========================================
MENU ITEM
========================================= */

.admin-menu-item{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
font-size:15px;
font-weight:500;
}

.admin-menu-item:hover{
background:rgba(255,255,255,0.08);
}

.admin-menu-item.active{
background:linear-gradient(
135deg,
#e6007e,
#8a0f63
);
}

/* =========================================
MAIN
========================================= */

.admin-main{
margin-left:270px;
flex:1;
padding:30px;
}

/* =========================================
HEADER
========================================= */

.admin-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

/* =========================================
TITLE
========================================= */

.admin-title{
font-size:36px;
font-weight:700;
color:#111827;
}

/* =========================================
SEARCH
========================================= */

.admin-search{
background:#fff;
border-radius:14px;
padding:14px 18px;
display:flex;
align-items:center;
gap:10px;
width:320px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.admin-search input{
border:none;
outline:none;
width:100%;
font-size:15px;
background:none;
}

/* =========================================
STATS GRID
========================================= */

.stats-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

/* =========================================
STAT CARD
========================================= */

.stat-card{
background:#fff;
border-radius:22px;
padding:24px;
box-shadow:0 4px 20px rgba(0,0,0,0.06);
}

.stat-label{
font-size:15px;
color:#6b7280;
margin-bottom:10px;
}

.stat-value{
font-size:34px;
font-weight:700;
color:#111827;
}

/* =========================================
SECTION
========================================= */

.admin-section{
background:#fff;
border-radius:24px;
padding:24px;
box-shadow:0 4px 20px rgba(0,0,0,0.06);
}

/* =========================================
SECTION HEADER
========================================= */

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
flex-wrap:wrap;
gap:20px;
}

.section-title{
font-size:26px;
font-weight:700;
}

/* =========================================
PROFILE GRID
========================================= */

.admin-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:24px;
}

/* =========================================
PROFILE CARD
========================================= */

.admin-card{
background:#fff;
border-radius:22px;
overflow:hidden;
border:1px solid #eee;
transition:0.3s;
cursor:pointer;
}

.admin-card:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* =========================================
PROFILE IMAGE
========================================= */

.admin-card img{
width:100%;
height:320px;
object-fit:cover;
}

/* =========================================
PROFILE CONTENT
========================================= */

.admin-content{
padding:20px;
}

.admin-content h2{
margin:0 0 10px;
font-size:24px;
color:#111827;
}

.admin-content p{
margin:6px 0;
color:#6b7280;
}

/* =========================================
STATUS BADGE
========================================= */

.status-badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
font-size:13px;
font-weight:600;
margin-top:12px;
background:#fff4d6;
color:#b45309;
}

/* =========================================
RESPONSIVE
========================================= */

@media(max-width:900px){

.admin-sidebar{
width:85px;
padding:18px 12px;
}

.admin-logo{
display:none;
}

.admin-menu-item span{
display:none;
}

.admin-main{
margin-left:85px;
padding:20px;
}

.admin-search{
width:100%;
}

}

</style>

</head>

<body>

<div class="admin-layout">

<!-- =========================================
SIDEBAR
========================================= -->

<div class="admin-sidebar">

<div class="admin-logo">

Dawoodi Bohra Match Admin

</div>

<div class="admin-menu">

<div class="admin-menu-item active">

<i data-lucide="clock-3"></i>

<span>
Pending Approval
</span>

</div>

<div class="admin-menu-item">

<i data-lucide="badge-check"></i>

<span>
Approved Profiles
</span>

</div>

<div class="admin-menu-item">

<i data-lucide="rotate-ccw"></i>

<span>
Returned Profiles
</span>

</div>

<div class="admin-menu-item">

<i data-lucide="shield-x"></i>

<span>
Blocked Users
</span>

</div>

<div class="admin-menu-item">

<i data-lucide="flag"></i>

<span>
Reported Profiles
</span>

</div>

<div class="admin-menu-item">

<i data-lucide="log-out"></i>

<span>
Logout
</span>

</div>

</div>

</div>

<!-- =========================================
MAIN
========================================= -->

<div class="admin-main">

<!-- =========================================
HEADER
========================================= -->

<div class="admin-header">

<div class="admin-title">

Admin Approval Panel

</div>

<div class="admin-search">

<i data-lucide="search"></i>

<input
type="text"
placeholder="Search profiles...">

</div>

</div>

<!-- =========================================
STATS
========================================= -->

<div class="stats-grid">

<div class="stat-card">

<div class="stat-label">
Pending Approvals
</div>

<div class="stat-value"
id="pending-count">

0

</div>

</div>

<div class="stat-card">

<div class="stat-label">
Approved Profiles
</div>

<div class="stat-value"
id="approved-count">

0

</div>

</div>

<div class="stat-card">

<div class="stat-label">
Returned Profiles
</div>

<div class="stat-value"
id="returned-count">

0

</div>

</div>

<div class="stat-card">

<div class="stat-label">
Blocked Users
</div>

<div class="stat-value"
id="blocked-count">

0

</div>

</div>

</div>

<!-- =========================================
SECTION
========================================= -->

<div class="admin-section">

<div class="section-header">

<div class="section-title">

Pending Profile Reviews

</div>

</div>

<div class="admin-grid"
id="admin-grid">

</div>

</div>

</div>

</div>

<!-- =========================================
TOAST
========================================= -->

<div id="toast"
class="toast"></div>

<!-- =========================================
LOADER
========================================= -->

<div id="global-loader"
class="global-loader">

<div class="loader-spinner"></div>

</div>

<!-- =========================================
FIREBASE
========================================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase/firebase-config.js"></script>

<script src="js/ui.js"></script>

<script src="js/admin.js"></script>

<script>

lucide.createIcons();

</script>

<!-- =========================================
PROFILE REVIEW MODAL
========================================= -->

<div class="review-modal"
id="review-modal">

<div class="review-container">

<!-- =========================================
HEADER
========================================= -->

<div class="review-header">

<h2>
Profile Review
</h2>

<button
class="close-review"
onclick="closeReviewModal()">

✕

</button>

</div>

<!-- =========================================
BODY
========================================= -->

<div
class="review-body"
id="review-body">

</div>

</div>

</div>
  
</body>

</html>
